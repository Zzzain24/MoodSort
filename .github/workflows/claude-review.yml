name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # check actions work
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review the changes in this PR. Focus on:
            - Bugs and logic errors
            - Security issues
            - Code quality and readability
            - Anything that looks off given the project context

            Be concise — this is a personal project, so skip nitpicks.
            Post inline comments on specific lines where relevant.
